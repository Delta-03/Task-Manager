<!DOCTYPE html>
<html>
<head><title>Register</title></head>
<body style="font-family: Arial, sans-serif; margin: 40px;">
    <h2>Secure User Registration</h2>
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Username" required><br><br>
        <input type="email" name="email" placeholder="Email Address" required><br><br>
        <input type="password" name="password" placeholder="Password (Min 8 Characters)" required><br><br>
        <button type="submit">Sign Up Account</button>
    </form>
    <br><a href="/login">Already a user? Login here</a>
</body>
</html>
